<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Eletro Tupi — Sistema de Orçamentos</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:#1a2040;background:#f0f2f7;overflow:hidden;height:100vh;}
.nav{background:#0F1C3F;border-bottom:3px solid #E8B800;display:flex;align-items:stretch;height:57px;flex-shrink:0;}
.nav-logo{background:#E8B800;padding:6px 12px;display:flex;align-items:center;}
.nav-mid{flex:1;padding:4px 14px;display:flex;flex-direction:column;justify-content:center;}
.nav-e{color:#fff;font-weight:700;font-size:12px;line-height:1.3;}
.nav-d{color:#8a9dc0;font-size:10px;margin-top:1px;}
.nav-right{display:flex;align-items:center;gap:7px;padding:0 12px;}
.layout{display:flex;height:calc(100vh - 57px);}
.sidebar{width:225px;background:#fff;border-right:1px solid #dde0ec;display:flex;flex-direction:column;flex-shrink:0;}
.sb-head{padding:10px;border-bottom:1px solid #dde0ec;}
.sb-new{display:flex;gap:5px;margin-top:7px;}
.sb-section{padding:8px 10px 4px;font-size:10px;font-weight:700;color:#8898bb;text-transform:uppercase;letter-spacing:.5px;}
.sb-filters{display:flex;gap:3px;padding:0 10px 8px;}
.sb-filters button{flex:1;border:none;border-radius:4px;padding:4px 0;font-size:10px;font-weight:700;cursor:pointer;}
.sb-list{flex:1;overflow-y:auto;}
.sb-item{padding:9px 10px;border-bottom:1px solid #f0f2f7;cursor:pointer;transition:background .1s;}
.sb-item:hover,.sb-item.active{background:#eef0fb;}
.main{flex:1;overflow:auto;display:flex;flex-direction:column;}
.home{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:18px;}
.ed-bar{background:#0F1C3F;border-bottom:3px solid #E8B800;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ed-scroll{flex:1;overflow-y:auto;padding:14px 16px;}
.sec{background:#fff;border:1px solid #dde0ec;border-radius:8px;margin-bottom:10px;overflow:hidden;}
.sh{background:#1A2B5A;color:#fff;padding:7px 12px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.sh i{color:#E8B800;font-size:13px;}
.sb2{padding:12px;}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:7px;}
.s2{grid-column:span 2;}
.fl{display:flex;flex-direction:column;gap:2px;}
.fl label{font-size:10px;color:#5a6480;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
input.fi,select.fi{border:1px solid #c5cad8;border-radius:5px;padding:5px 8px;font-size:12px;color:#1a2040;background:#fff;width:100%;outline:none;font-family:inherit;}
input.fi:focus,select.fi:focus{border-color:#1A2B5A;box-shadow:0 0 0 2px rgba(26,43,90,.08);}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:#eef0fb;color:#4a5270;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:6px;text-align:left;border-bottom:1px solid #dde0ec;}
.tbl td{padding:4px 5px;border-bottom:1px solid #edf0f7;vertical-align:middle;}
.tbl .tc{font-weight:700;color:#1A2B5A;text-align:right;padding-right:7px!important;white-space:nowrap;}
.rm-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:13px;padding:1px 4px;border-radius:3px;}
.rm-btn:hover{color:#c0390a;}
.add-row{display:flex;align-items:center;gap:5px;background:none;border:1.5px dashed #c0c6e0;color:#253570;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;margin-top:7px;width:100%;justify-content:center;font-weight:600;}
.add-row:hover{background:#f0f3ff;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.lbx{background:#f7f8fc;border-radius:6px;padding:10px;margin-bottom:8px;}
.lbx:last-child{margin-bottom:0;}
.lbt{font-size:10px;font-weight:700;color:#5a6480;text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px;display:flex;align-items:center;gap:4px;}
.lbt i{color:#253570;font-size:12px;}
.ck{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.ck input{width:14px;height:14px;accent-color:#1A2B5A;cursor:pointer;}
.ck label{font-size:12px;cursor:pointer;font-weight:500;}
.hr-types{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.hb{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;background:#fff;border:1px solid #d0d4e0;padding:3px 7px;border-radius:4px;font-weight:500;}
.hb.sel{background:#1A2B5A;color:#fff;border-color:#1A2B5A;}
.rate-tag{background:#fffbe0;color:#0F1C3F;font-size:11px;font-weight:700;padding:3px 7px;border-radius:3px;border:1px solid #E8B800;display:inline-block;margin-top:4px;}
.summ{display:flex;flex-direction:column;gap:6px;}
.sr{display:flex;justify-content:space-between;font-size:12px;}
.sr span:first-child{color:#5a6480;}
.sr span:last-child{font-weight:600;}
.sdiv{border:none;border-top:1px solid #dde0ec;margin:1px 0;}
.disc-row{display:flex;align-items:center;gap:7px;}
.disc-row label{font-size:12px;color:#5a6480;white-space:nowrap;font-weight:500;}
.disc-row input{border:1px solid #c5cad8;border-radius:5px;padding:5px 7px;font-size:12px;color:#1a2040;background:#fff;width:95px;outline:none;}
.tot-box{background:#1A2B5A;color:#fff;border-radius:6px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;}
.tot-box .tl{font-size:12px;font-weight:700;}
.tot-box .tv{font-size:17px;font-weight:700;color:#E8B800;}
.bn{background:#1A2B5A;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.bn:hover{background:#0F1C3F;}
.by{background:#E8B800;color:#0F1C3F;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.by:hover{background:#C9A000;}
.bs{background:#fff;border:1px solid #dde0ec;border-radius:5px;padding:4px 9px;font-size:11px;cursor:pointer;color:#5a6480;font-weight:600;display:inline-flex;align-items:center;gap:3px;}
.bs:hover{background:#f0f2f8;}
.bs.red{color:#c0390a;border-color:#f0c0c0;}
.bs.red:hover{background:#fff5f5;}
.bs.yel{color:#8B6800;border-color:#E8B800;}
.bs.grn{color:#1a7a3a;border-color:#a0d8b0;}
.bs.grn:hover{background:#f0fff5;}
.ov{position:fixed;inset:0;background:rgba(10,20,50,.55);display:flex;align-items:center;justify-content:center;z-index:500;}
.modal{background:#fff;border-radius:10px;width:400px;max-width:96vw;max-height:90vh;overflow:auto;box-shadow:0 8px 40px rgba(0,0,0,.25);}
.modal.wide{width:660px;}
.mh{background:#1A2B5A;color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-radius:10px 10px 0 0;}
.mh-t{font-weight:700;font-size:13px;}
.mc{padding:18px;}
.login-wrap{min-height:100vh;background:linear-gradient(135deg,#0F1C3F 0%,#1A2B5A 60%,#1d3a70 100%);display:flex;align-items:center;justify-content:center;}
.login-box{background:#fff;border-radius:12px;padding:32px 36px;width:340px;box-shadow:0 12px 48px rgba(0,0,0,.3);}
.toast{position:fixed;bottom:16px;right:16px;background:#1A2B5A;color:#fff;padding:8px 14px;border-radius:6px;font-size:12px;font-weight:600;border-left:4px solid #E8B800;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:9999;animation:fi .25s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.pix-zone{border:1.5px dashed #c0c8e0;border-radius:6px;padding:12px;display:flex;align-items:center;gap:12px;min-height:80px;}
.list-item{background:#fff;border:1px solid #dde0ec;border-radius:7px;padding:10px 14px;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.list-item:hover{background:#f7f8fc;}
.emp-card{border:2px solid transparent;border-radius:8px;padding:12px;cursor:pointer;transition:all .15s;background:#f7f8fc;}
.emp-card:hover{border-color:#8a9dc0;}
.emp-card.sel{border-color:#E8B800;background:#fffbe0;}
.qr-preview{width:110px;height:110px;object-fit:cover;border-radius:6px;border:1px solid #dde0ec;}
.qr-placeholder{width:110px;height:110px;background:#eef0fb;border-radius:6px;border:1.5px dashed #c0c8e0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#8898bb;font-size:10px;text-align:center;gap:4px;}

/* ── MOBILE ── */
@media(max-width:700px){
  body{overflow:auto;}
  /* Hide desktop nav details, show compact */
  .nav{height:50px;}
  .nav-logo{padding:5px 9px;}
  .nav-logo svg{height:34px;}
  .nav-mid .nav-d{display:none;}
  .nav-e{font-size:11px;}
  .nav-right{gap:5px;padding:0 8px;}
  .nav-right .nav-user-name{display:none;}
  /* Full-width layout, no sidebar by default */
  .layout{flex-direction:column;height:auto;min-height:calc(100vh - 50px);}
  .sidebar{
    width:100%;height:auto;border-right:none;
    border-bottom:1px solid #dde0ec;
    display:none; /* hidden by default on mobile */
  }
  .sidebar.mob-open{display:flex;}
  .main{width:100%;min-height:calc(100vh - 130px);}
  /* Bottom nav bar */
  .mob-bar{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:#0F1C3F;border-top:2px solid #E8B800;
    height:58px;z-index:200;
  }
  .mob-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:none;border:none;color:#8a9dc0;cursor:pointer;font-size:9px;font-weight:700;
    text-transform:uppercase;letter-spacing:.3px;gap:3px;padding:4px 2px;
  }
  .mob-btn i{font-size:20px;}
  .mob-btn.active{color:#E8B800;}
  .mob-btn.action{background:#E8B800;color:#0F1C3F;margin:6px 3px;border-radius:8px;flex:1.2;}
  /* Editor bar on mobile */
  .ed-bar{flex-wrap:wrap;gap:6px;padding:8px 10px;}
  .ed-bar > div:first-child{flex:1;min-width:0;}
  .ed-bar > div:last-child{width:100%;display:flex;gap:5px;overflow-x:auto;}
  .ed-bar button{white-space:nowrap;font-size:11px;padding:5px 9px;}
  /* Form grids → single column */
  .fg{grid-template-columns:1fr 1fr;}
  .s2{grid-column:span 2;}
  /* Two col → one col */
  .two{grid-template-columns:1fr;}
  /* Tables → card-style */
  .tbl thead{display:none;}
  .tbl tbody tr{
    display:grid;grid-template-columns:1fr auto;
    gap:4px;padding:8px;border:1px solid #edf0f7;
    border-radius:6px;margin-bottom:7px;background:#fff;
  }
  .tbl tbody td{border:none;padding:2px 4px;}
  .tbl tbody td:first-child{grid-column:span 2;}
  .tbl tbody td input{font-size:12px;}
  .tbl tfoot tr{display:flex;justify-content:space-between;padding:8px 4px;}
  .tbl tfoot td{border:none;}
  /* Sidebar list compact */
  .sb-head{padding:8px;}
  .sb-new{gap:4px;}
  .sb-list{max-height:40vh;overflow-y:auto;}
  /* Home buttons stack */
  .home > div:nth-child(3){flex-direction:column;width:100%;padding:0 16px;}
  .home > div:nth-child(3) button{width:100%;justify-content:center;}
  /* Modal full screen on mobile */
  .ov{align-items:flex-end;}
  .modal{width:100%!important;max-width:100%!important;border-radius:14px 14px 0 0;max-height:92vh;}
  .modal.wide{width:100%!important;}
  /* Nav right - only icons */
  .nav-right .bs span{display:none;}
  /* Pad bottom for mob bar */
  .ed-scroll{padding-bottom:70px;}
  .main > .home{padding-bottom:70px;}
  #mainWrap > div{padding-bottom:70px;}
}
@media(min-width:701px){
  .mob-bar{display:none!important;}
  .mob-sidebar-toggle{display:none!important;}
  .mob-wizard{display:none!important;}
}
/* Wizard styles (mobile only) */
.wz-wrap{display:flex;flex-direction:column;height:calc(100vh - 50px);background:#f0f2f7;padding-bottom:58px;}
.wz-progress{background:#fff;padding:12px 16px 10px;border-bottom:1px solid #dde0ec;flex-shrink:0;}
.wz-steps{display:flex;gap:4px;margin-bottom:6px;}
.wz-step{flex:1;height:4px;border-radius:2px;background:#e0e3f0;transition:background .3s;}
.wz-step.done{background:#E8B800;}
.wz-step.active{background:#1A2B5A;}
.wz-title{font-size:13px;font-weight:700;color:#1A2B5A;}
.wz-sub{font-size:11px;color:#8898bb;margin-top:1px;}
.wz-body{flex:1;overflow-y:auto;padding:14px 14px 10px;}
.wz-card{background:#fff;border-radius:10px;border:1px solid #dde0ec;padding:14px;margin-bottom:10px;}
.wz-card-title{font-size:11px;font-weight:700;color:#1A2B5A;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.wz-card-title i{color:#E8B800;font-size:14px;}
.wz-footer{background:#fff;border-top:1px solid #dde0ec;padding:10px 14px;display:flex;gap:8px;flex-shrink:0;padding-bottom:calc(10px + env(safe-area-inset-bottom));}
.wz-footer button{flex:1;padding:11px;font-size:13px;font-weight:700;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.wz-btn-back{background:#f0f2f7;color:#5a6480;}
.wz-btn-next{background:#1A2B5A;color:#fff;}
.wz-btn-yel{background:#E8B800;color:#0F1C3F;}
.wz-btn-grn{background:#1a7a3a;color:#fff;}
.wz-fl{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
.wz-fl label{font-size:10px;color:#5a6480;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.wz-fi{border:1px solid #c5cad8;border-radius:8px;padding:10px 12px;font-size:14px;color:#1a2040;background:#fff;width:100%;outline:none;font-family:inherit;}
.wz-fi:focus{border-color:#1A2B5A;box-shadow:0 0 0 3px rgba(26,43,90,.1);}
.wz-suggest{background:#fffbe0;border:1px solid #E8B800;border-radius:8px;padding:12px;margin-bottom:12px;}
.wz-suggest-title{font-size:12px;font-weight:700;color:#1A2B5A;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.wz-suggest-info{font-size:12px;color:#4a5270;line-height:1.7;margin-bottom:10px;}
.wz-suggest-btns{display:flex;gap:7px;}
.wz-suggest-btns button{flex:1;padding:8px;font-size:12px;font-weight:700;border-radius:7px;border:none;cursor:pointer;}
.item-card{background:#f7f8fc;border:1px solid #dde0ec;border-radius:8px;padding:10px;margin-bottom:8px;position:relative;}
.item-card-rm{position:absolute;top:8px;right:8px;background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;}
.item-card-rm:hover{color:#c0390a;}
.wz-add-btn{width:100%;padding:11px;background:none;border:1.5px dashed #c0c6e0;border-radius:8px;color:#1A2B5A;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.wz-add-btn:hover{background:#f0f3ff;}
.hr-type-btn{display:flex;align-items:center;gap:6px;padding:10px 12px;background:#fff;border:1.5px solid #d0d4e0;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin-bottom:6px;width:100%;}
.hr-type-btn.sel{background:#1A2B5A;color:#fff;border-color:#1A2B5A;}
.hr-type-btn i{font-size:16px;}
.review-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f2f7;font-size:13px;}
.review-row:last-child{border:none;}
.review-row span:first-child{color:#5a6480;}
.review-row span:last-child{font-weight:600;color:#1a2040;text-align:right;max-width:60%;}
.review-section{background:#fff;border-radius:10px;border:1px solid #dde0ec;margin-bottom:10px;overflow:hidden;}
.review-section-hdr{background:#1A2B5A;color:#fff;padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:5px;}
.review-section-hdr i{color:#E8B800;}
.review-section-body{padding:10px 12px;}
.review-total{background:#1A2B5A;color:#fff;border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.review-total .rl{font-size:13px;font-weight:700;}
.review-total .rv{font-size:22px;font-weight:700;color:#E8B800;}
.action-card{background:#fff;border:1px solid #dde0ec;border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px;}
.action-btn{width:100%;padding:13px;font-size:14px;font-weight:700;border-radius:9px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.action-btn i{font-size:18px;}


</style>

function brl(v){return"R$ "+Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function hoje(){return new Date().toLocaleDateString("pt-BR");}
function getEmpresa(){return EMPRESAS.find(e=>e.id===S.empresaId)||EMPRESAS[0];}
function sim(a,b){
  a=(a||"").toLowerCase().trim();b=(b||"").toLowerCase().trim();
  if(!a||!b)return 0;if(a===b)return 1;
  if(a.includes(b)||b.includes(a))return 0.8;
  const wa=a.split(" "),wb=b.split(" ");
  const c=wa.filter(w=>w.length>2&&wb.some(x=>x.startsWith(w)||w.startsWith(x)));
  return c.length/Math.max(wa.length,wb.length);
}

function tots(d){
  const it=d.items.reduce((s,x)=>s+(parseFloat(x.qty)||0)*(parseFloat(x.unit)||0),0);
  const mo=d.mo.on?(parseFloat(d.mo.val)||0):0;
  const hr=d.hr.on?(parseFloat(d.hr.qty)||0)*RATES[d.hr.tipo]:0;
  const sub=it+mo+hr;
  return{it,mo,hr,sub,tot:Math.max(0,sub-(parseFloat(d.disc)||0))};
}

function openDoc(did){
  const d=S.docs.find(x=>x.id===did);
  if(d){S.doc=JSON.parse(JSON.stringify(d));S.view="editor";S.suggestDone=false;RE();}
}
function checkSimilar(val){
  if(S.suggestDone||!val||val.length<3)return;
  const m=S.clients.find(c=>sim(val,c.nome)>=0.7||sim(val,c.ref)>=0.7);
  if(m){S.suggest=m;RE();}
}
function applyClient(c){
  const cur=S.doc.cl;
  Object.keys(c).forEach(k=>{if(c[k])cur[k]=cur[k]||c[k];});
  if(c.nome)cur.nome=c.nome;if(c.ref)cur.ref=c.ref;
}
async function lookupCEP(cep){
  const clean=(cep||"").replace(/\D/g,"");
  if(clean.length!==8||!S.doc)return;
  try{
    const r=await fetch("https://viacep.com.br/ws/"+clean+"/json/");
    const d=await r.json();
    if(!d.erro){
      if(d.logradouro)S.doc.cl.end=d.logradouro;
      if(d.bairro)S.doc.cl.bairro=d.bairro;
      if(d.localidade)S.doc.cl.cidade=d.localidade;
      if(d.uf)S.doc.cl.uf=d.uf;
      RE();
    }
  }catch{}
}
function reCalc(){
  if(!S.doc)return;
  const t=tots(S.doc);
  S.doc.items.forEach(it=>{
    const cell=document.querySelector(`[data-iid="${it.id}"] .tc`);
    if(cell)cell.textContent=brl((parseFloat(it.qty)||0)*(parseFloat(it.unit)||0));
  });
  const upd=(id,v)=>{const el=q(id);if(el)el.textContent=brl(v);};
  upd("totIt",t.it);upd("sIt",t.it);upd("sMO",t.mo);upd("sHR",t.hr);upd("sSub",t.sub);upd("sTot",t.tot);
  const mr=q("sMOr");if(mr)mr.style.display=S.doc.mo.on?"":"none";
  const hr=q("sHRr");if(hr)hr.style.display=S.doc.hr.on?"":"none";
}
function newDoc(tipo){
  const n=(tipo==="orc"?"ORC":"OS")+" "+String(S.nextN[tipo]).padStart(3,"0");
  S.nextN[tipo]++;
  S.doc=blankDoc(tipo,n);
  S.suggestDone=false;
  if(window.innerWidth<=700){S.view="wizard";S.wizardStep=1;}
  else{S.view="editor";}
  RE();
}
function saveDoc(){
  const d=S.doc;if(!d)return;
  if(!d.cl.nome){showToast("Preencha o nome do cliente.");return;}
  if(d.cl.nome){
    const idx=S.clients.findIndex(c=>sim(c.nome,d.cl.nome)>=0.7||sim(c.ref,d.cl.ref)>=0.7);
    if(idx>=0){Object.keys(d.cl).forEach(k=>{if(d.cl[k])S.clients[idx][k]=d.cl[k];});}
    else{S.clients.push({...d.cl});}
  }
  const idx=S.docs.findIndex(x=>x.id===d.id);
  const copy=JSON.parse(JSON.stringify(d));
  if(idx>=0)S.docs[idx]=copy;else S.docs.push(copy);
  showToast("Documento salvo!");
  S.view="list";RE();
}
function showToast(msg){
  S.toast=msg;RE();
  setTimeout(()=>{S.toast="";const el=document.querySelector(".toast");if(el)el.remove();},2500);
}

function convertToOS(doc){
  if(!confirm("Converter este orçamento em Ordem de Serviço?\nO orçamento original será mantido."))return;
  const n="OS "+String(S.nextN["os"]).padStart(3,"0");
  S.nextN["os"]++;
  const newOS=JSON.parse(JSON.stringify(doc));
  newOS.id=gid();
  newOS.tipo="os";
  newOS.num=n;
  newOS.date=hoje();
  newOS.empresaId=doc.empresaId||S.empresaId;
  S.docs.push(newOS);
  S.doc=newOS;
  S.view="editor";
  RE();
  showToast("OS "+n+" criada a partir de "+doc.num+"!");
}

function buildPDFHtml(doc){
  const t=tots(doc);const c=doc.cl;
  const emp=EMPRESAS.find(x=>x.id===doc.empresaId)||getEmpresa();
  const items=doc.items.filter(it=>it.desc||(parseFloat(it.unit)||0)>0);
  const cf=[
    c.nome&&["Cliente",c.nome],c.ref&&["Referência",c.ref],c.cpf&&["CPF/CNPJ",c.cpf],
    c.tel&&["Telefone",c.tel],c.email&&["E-mail",c.email],c.cep&&["CEP",c.cep],
    c.end&&["Endereço",c.end+(c.bairro?", "+c.bairro:"")],
    c.cidade&&["Cidade/UF",c.cidade+(c.uf?"/"+c.uf:"")]
  ].filter(Boolean);

function doPDF(doc){
  const html=buildPDFHtml(doc);
  const w=window.open("","_blank");
  if(!w){alert("Permita pop-ups neste site para gerar o PDF.");return;}
  w.document.write(html);w.document.close();
  setTimeout(()=>w.print(),700);
}

function doDownloadPDF(doc){
  showToast("Gerando PDF para download...");
  const html=buildPDFHtml(doc);
  const iframe=document.createElement("iframe");
  iframe.style.cssText="position:fixed;left:-9999px;top:-9999px;width:794px;height:1123px;border:none;";
  document.body.appendChild(iframe);
  iframe.contentDocument.open();
  iframe.contentDocument.write(html);
  iframe.contentDocument.close();
  setTimeout(()=>{
    const iframeDoc=iframe.contentDocument;
    html2canvas(iframeDoc.body,{
      scale:2,useCORS:true,allowTaint:true,
      backgroundColor:"#ffffff",width:794,windowWidth:794
    }).then(canvas=>{
      const imgData=canvas.toDataURL("image/jpeg",0.95);
      const {jsPDF}=window.jspdf;
      const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
      const pgW=pdf.internal.pageSize.getWidth();
      const pgH=pdf.internal.pageSize.getHeight();
      const canvH=canvas.height;const canvW=canvas.width;
      const ratio=canvW/canvH;
      const pdfImgH=pgW/ratio;
      if(pdfImgH<=pgH){
        pdf.addImage(imgData,"JPEG",0,0,pgW,pdfImgH);
      } else {
        let yPos=0;let remainH=canvH;
        const sliceH=Math.floor(canvW*(pgH/pgW));
        while(remainH>0){
          const pageCanvas=document.createElement("canvas");
          pageCanvas.width=canvW;
          const thisSlice=Math.min(sliceH,remainH);
          pageCanvas.height=thisSlice;
          const ctx=pageCanvas.getContext("2d");
          ctx.drawImage(canvas,0,yPos,canvW,thisSlice,0,0,canvW,thisSlice);
          const pageImg=pageCanvas.toDataURL("image/jpeg",0.95);
          if(yPos>0)pdf.addPage();
          pdf.addImage(pageImg,"JPEG",0,0,pgW,thisSlice*(pgW/canvW));
          yPos+=thisSlice;remainH-=thisSlice;
        }
      }
      const fname=doc.num.replace(/ /g,"_")+"_"+((doc.cl.nome||"cliente").split(" ")[0])+".pdf";
      pdf.save(fname);
      document.body.removeChild(iframe);
      showToast("PDF salvo: "+fname);
    }).catch(err=>{
      document.body.removeChild(iframe);
      console.error(err);
      showToast("Erro ao gerar PDF. Use Imprimir PDF.");
    });
  },800);
}

const WZ_TITLES=[
  {t:"Cliente",s:"Nome e apelido"},

const TOTAL_STEPS=6;

function wStep(){return S.wizardStep||1;}

function rWizard(){
  const d=S.doc;if(!d)return"";
  const step=wStep();
  const info=WZ_TITLES[step-1];
  // progress bars
  const bars=Array.from({length:TOTAL_STEPS},(_,i)=>{
    const cls=i+1<step?"done":i+1===step?"active":"";
    return`<div class="wz-step ${cls}"></div>`;
  }).join("");

  let body="";
  if(step===1)body=rWzStep1(d);
  else if(step===2)body=rWzStep2(d);
  else if(step===3)body=rWzStep3(d);
  else if(step===4)body=rWzStep4(d);
  else if(step===5)body=rWzStep5(d);
  else if(step===6)body=rWzStep6(d);

  const isFirst=step===1;
  const isLast=step===TOTAL_STEPS;

  return`
  <div class="wz-wrap">
    <div class="wz-progress">
      <div class="wz-steps">${bars}</div>
      <div class="wz-title">${step}. ${info.t}</div>

    <div class="review-section-hdr"><i class="ti ti-tools"></i> Serviços</div>
    <div class="review-section-body">
      ${d.mo.on?`<div class="review-row"><span>Mão de obra</span><span>${brl(t.mo)}</span></div>`:""}
      ${d.hr.on?`<div class="review-row"><span>${RL[d.hr.tipo]} × ${d.hr.qty}h</span><span>${brl(t.hr)}</span></div>`:""}
    </div>
  </div>`:""}
  ${parseFloat(d.disc)>0?`<div class="review-section">
    <div class="review-section-hdr"><i class="ti ti-discount"></i> Desconto</div>
    <div class="review-section-body"><div class="review-row"><span>Desconto</span><span style="color:#c0390a;">— ${brl(parseFloat(d.disc))}</span></div></div>
  </div>`:""}
  <div class="review-total">
    <div class="rl">TOTAL</div>
    <div class="rv">${brl(t.tot)}</div>
  </div>
  <div style="background:#f7f8fc;border:1px solid #dde0ec;border-radius:8px;padding:10px 12px;font-size:11px;color:#8898bb;text-align:center;">
    <i class="ti ti-building" style="margin-right:4px;"></i>${esc(emp.razao)} · CNPJ ${emp.cnpj}
    <br>${d.tipo==="orc"?"Orçamento válido por 10 dias":"Ordem de Serviço"} · ${d.num} · ${d.date}
  </div>`;}

function rWzStep6(d){
  const t=tots(d);
  return`
  <div style="text-align:center;padding:16px 0 10px;">
    <div style="width:64px;height:64px;background:#E8B800;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
      <i class="ti ti-check" style="font-size:32px;color:#0F1C3F;"></i>
    </div>
    <div style="font-size:16px;font-weight:700;color:#1A2B5A;">${d.num} salvo!</div>
    <div style="font-size:13px;color:#5a6480;margin-top:4px;">Total: ${brl(t.tot)}</div>
  </div>
  <div class="action-card">
    <button class="action-btn" style="background:#1A2B5A;color:#fff;" id="wzPrint"><i class="ti ti-printer"></i> Imprimir / Ver PDF</button>
    <button class="action-btn" style="background:#1a7a3a;color:#fff;" id="wzDownload"><i class="ti ti-download"></i> Baixar PDF no celular</button>
    ${navigator.share?`<button class="action-btn" style="background:#253570;color:#fff;" id="wzShare"><i class="ti ti-share"></i> Compartilhar</button>`:""}
    ${d.tipo==="orc"?`<button class="action-btn" style="background:#E8B800;color:#0F1C3F;" id="wzConvert"><i class="ti ti-transfer"></i> Converter em OS</button>`:""}
    <button class="action-btn" style="background:#f0f2f7;color:#5a6480;" id="wzNewDoc"><i class="ti ti-plus"></i> Novo documento</button>
  </div>`;}

// ── Wizard navigation ──
function wSaveStep1(){
  const nome=(q("w1Nome").value||"").trim();
  const ref=(q("w1Ref").value||"").trim();
  if(!nome){q("w1Nome").focus();showToast("Informe o nome do cliente.");return false;}
  S.doc.cl.nome=nome;S.doc.cl.ref=ref;
  // check similar
  if(!S.suggestDone&&nome.length>=3){
    const m=S.clients.find(c=>sim(nome,c.nome)>=0.7||sim(ref,c.ref)>=0.7);
    if(m){S.suggest=m;RE();return false;}
  }
  return true;
}
function wSaveStep2(){
  S.doc.cl.cpf=(q("w2Cpf").value||"");
  S.doc.cl.tel=(q("w2Tel").value||"");
  S.doc.cl.email=(q("w2Email").value||"");
  S.doc.cl.cep=(q("w2Cep").value||"");
  S.doc.cl.end=(q("w2End").value||"");
  S.doc.cl.bairro=(q("w2Bairro").value||"");
  S.doc.cl.cidade=(q("w2Cidade").value||"");
  S.doc.cl.uf=(q("w2Uf").value||"").toUpperCase();
  return true;
}
function wSaveStep3(){
  qA(".wzDesc").forEach(el=>{const it=S.doc.items.find(x=>x.id===el.dataset.iid);if(it)it.desc=el.value;});
  qA(".wzQty").forEach(el=>{const it=S.doc.items.find(x=>x.id===el.dataset.iid);if(it)it.qty=el.value;});
  qA(".wzUnit").forEach(el=>{const it=S.doc.items.find(x=>x.id===el.dataset.iid);if(it)it.unit=el.value;});
  return true;
}
function wSaveStep4(){
  S.doc.mo.on=q("w4ChkMO").checked;
  if(S.doc.mo.on)S.doc.mo.val=(q("w4ValMO").value||"");
  S.doc.hr.on=q("w4ChkHR").checked;
  if(S.doc.hr.on){S.doc.hr.qty=(q("w4NumHR").value||"");}
  S.doc.disc=(q("w4Disc").value||"");
  return true;
}

function wzNext(){
  const step=wStep();
  let ok=true;
  if(step===1)ok=wSaveStep1();
  else if(step===2)ok=wSaveStep2();
  else if(step===3)ok=wSaveStep3();
  else if(step===4)ok=wSaveStep4();
  if(!ok)return;
  S.wizardStep=step+1;
  RE();
  const wb=q("wzBody");if(wb)wb.scrollTop=0;
}
function wzBack(){
  if(wStep()===1)return;
  S.wizardStep=wStep()-1;RE();
  const wb=q("wzBody");if(wb)wb.scrollTop=0;
}
function wzSaveAndFinish(){
  // save to docs
  const d=S.doc;
  if(d.cl.nome){
    const idx=S.clients.findIndex(c=>sim(c.nome,d.cl.nome)>=0.7||sim(c.ref,d.cl.ref)>=0.7);
    if(idx>=0){Object.keys(d.cl).forEach(k=>{if(d.cl[k])S.clients[idx][k]=d.cl[k];});}
    else{S.clients.push({...d.cl});}
  }
  const idx=S.docs.findIndex(x=>x.id===d.id);
  const copy=JSON.parse(JSON.stringify(d));
  if(idx>=0)S.docs[idx]=copy;else S.docs.push(copy);
  S.wizardStep=6;RE();
}

function bindWizard(){
  const wzN=q("wzNext");if(wzN)wzN.onclick=wzNext;
  const wzB=q("wzBack");if(wzB)wzB.onclick=wzBack;
  const wzC=q("wzCancel");if(wzC)wzC.onclick=()=>{if(confirm("Cancelar e descartar?"))S.view="home",S.doc=null,RE();};
  const wzSV=q("wzSaveView");if(wzSV)wzSV.onclick=wzSaveAndFinish;
  // Step 1 suggest
  const wzYS=q("wzYesSug");if(wzYS)wzYS.onclick=()=>{applyClient(S.suggest);S.suggest=null;S.suggestDone=true;RE();};
  const wzNS=q("wzNoSug");if(wzNS)wzNS.onclick=()=>{S.suggest=null;S.suggestDone=true;RE();};
  // Step 2 CEP
  const w2c=q("w2Cep");if(w2c){w2c.onblur=async()=>{
    const cl=(w2c.value||"").replace(/\D/g,"");
    if(cl.length!==8)return;
    try{const r=await fetch("https://viacep.com.br/ws/"+cl+"/json/");const dj=await r.json();
      if(!dj.erro){
        if(q("w2End")&&!q("w2End").value&&dj.logradouro)q("w2End").value=dj.logradouro;
        if(q("w2Bairro")&&!q("w2Bairro").value&&dj.bairro)q("w2Bairro").value=dj.bairro;
        if(q("w2Cidade")&&!q("w2Cidade").value&&dj.localidade)q("w2Cidade").value=dj.localidade;
        if(q("w2Uf")&&!q("w2Uf").value&&dj.uf){q("w2Uf").value=dj.uf.toUpperCase();}
        showToast("Endereço preenchido!");
      }
    }catch{}
  };}
  // Step 3 items
  const wzAdd=q("wzAddItem");if(wzAdd)wzAdd.onclick=()=>{wSaveStep3();S.doc.items.push({id:gid(),desc:"",qty:1,unit:""});RE();setTimeout(()=>q("wzBody")&&(q("wzBody").scrollTop=9999),50);};
  qA(".wzRm").forEach(b=>b.onclick=()=>{const iid=b.dataset.iid;S.doc.items=S.doc.items.filter(x=>x.id!==iid);RE();});
  // live totals in step 3
  qA(".wzQty,.wzUnit").forEach(el=>el.oninput=()=>{
    const iid=el.dataset.iid;
    const it=S.doc.items.find(x=>x.id===iid);
    if(it){if(el.classList.contains("wzQty"))it.qty=el.value;else it.unit=el.value;}
    const row=el.closest(".item-card");
    if(row){const td=row.querySelector("[data-tot]")||row.querySelector("div[style*='text-align:right']");
      if(td){const it2=S.doc.items.find(x=>x.id===iid);if(it2)td.textContent="Total: "+brl((parseFloat(it2.qty)||0)*(parseFloat(it2.unit)||0));}}
  });
  // Step 4 toggles
  const w4mo=q("w4ChkMO");if(w4mo)w4mo.onchange=()=>{const f=q("w4MoF");if(f)f.style.display=w4mo.checked?"":"none";};
  const w4hr=q("w4ChkHR");if(w4hr)w4hr.onchange=()=>{const f=q("w4HrF");if(f)f.style.display=w4hr.checked?"":"none";};
  // HR type buttons
  qA("[data-hrv]").forEach(lb=>lb.onclick=()=>{
    const v=lb.dataset.hrv;S.doc.hr.tipo=v;
    // update visually
    qA("[data-hrv]").forEach(x=>{x.className="hr-type-btn"+(x.dataset.hrv===v?" sel":"");});
    const ht=q("w4HrTotal");const nhr=q("w4NumHR");
    if(ht&&nhr){const hrs=parseFloat(nhr.value)||0;ht.textContent=hrs>0?brl(hrs*RATES[v])+" ("+hrs+"h × R$ "+RATES[v].toLocaleString("pt-BR",{minimumFractionDigits:2})+"/h)":"Informe o número de horas";}
  });
  const w4nhr=q("w4NumHR");if(w4nhr)w4nhr.oninput=()=>{
    const ht=q("w4HrTotal");if(!ht)return;
    const hrs=parseFloat(w4nhr.value)||0;const v=S.doc.hr.tipo;
    ht.textContent=hrs>0?brl(hrs*RATES[v])+" ("+hrs+"h × R$ "+RATES[v].toLocaleString("pt-BR",{minimumFractionDigits:2})+"/h)":"Informe o número de horas";
  };
  // Step 6 actions
  const wzPrint=q("wzPrint");if(wzPrint)wzPrint.onclick=()=>doPDF(S.doc);
  const wzDown=q("wzDownload");if(wzDown)wzDown.onclick=()=>doDownloadPDF(S.doc);
  const wzShare=q("wzShare");if(wzShare)wzShare.onclick=async()=>{
    try{
      const html=buildPDFHtml(S.doc);
      const blob=new Blob([html],{type:"text/html"});
      const file=new File([blob],S.doc.num.replace(/ /g,"_")+".html",{type:"text/html"});
      if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:S.doc.num,text:"Orçamento Eletro Tupi"});}
      else{await navigator.share({title:S.doc.num,text:"Orçamento Eletro Tupi - Total: "+brl(tots(S.doc).tot)});}
    }catch(e){showToast("Compartilhamento cancelado.");}
  };
  const wzConv=q("wzConvert");if(wzConv)wzConv.onclick=()=>convertToOS(S.doc);
  const wzNew=q("wzNewDoc");if(wzNew)wzNew.onclick=()=>{S.view="home";S.doc=null;RE();};
  // ESC on wizard
  document.onkeydown=e=>{if(e.key==="Escape"&&S.view==="wizard"){wzBack();}};
}

// Post-render hook for wizard
const _RE_orig=RE;
RE=function(){_RE_orig();if(S.view==="wizard")bindWizard();};
RE();
</script>
</body>
